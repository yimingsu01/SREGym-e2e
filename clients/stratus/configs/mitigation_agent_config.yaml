# each step is defined as one tool call
max_step: 50
max_retry_attempts: 2
# choose from: naive, validate, none
retry_mode: validate
sync_tools:
  - name: wait_tool
    description: |
      Use this tool to wait for you action to take effect. The upper limit is 120 seconds.
          Any value above 120 seconds will be truncated to 120 seconds. If you call this tool
          along with other tools in your tool_calls list, this tool will be scheduled to the
          last for execution.

          Args:
              seconds (int): Number of seconds to wait.
  # File editing tools for code-level bug fixing
  - name: open_file
    description: |
      Open a file for viewing and editing. You must open a file before using edit or insert.

          Args:
              path (str): Absolute path to the file (e.g., /opt/source/src/java/MyClass.java)
              line_number (str): Optional line number to start viewing from (default: 1)
  - name: goto_line
    description: |
      Navigate to a specific line in the currently opened file.

          Args:
              line_number (int): The line number to navigate to (1-indexed)
  - name: edit
    description: |
      Replace text in the currently opened file. Searches for the first occurrence of the
          search string in the displayed window and replaces it with the replace string.

          Args:
              search (str): The text to search for (include exact whitespace/indentation)
              replace (str): The text to replace it with
              replace_all (bool): If True, replace all occurrences in the file (default: False)
  - name: insert
    description: |
      Insert text into the currently opened file at a specific line or at the end.

          Args:
              text (str): The text to insert
              line_number (int): Optional line number to insert after (default: end of file)
async_tools:
  - name: get_traces
    description: |
      Get Jaeger traces for a given service in the last n minutes.

          Args:
              service (str): The name of the service for which to retrieve trace data.
              last_n_minutes (int): The time range (in minutes) to look back from the current time.
  - name: get_services
    description: |
      Retrieve the list of service names from the Grafana instance.

          Args:

          Returns:
              List[str]: A list of service names available in Grafana.
  - name: get_operations
    description: |
      Query available operations for a specific service from the Grafana instance.

          Args:
              service (str): The name of the service whose operations should be retrieved.

          Returns:
              List[str]: A list of operation names associated with the specified service.
  - name: get_dependency_graph
    description: |
      Get service dependency graph from Jaeger's native dependencies API.
          Args:
              last_n_minutes (int): The time range (in minutes) to look back from the current time.
          Returns:
              str: JSON object representing the dependency graph.
  - name: get_metrics
    description: |
      Query real-time metrics data from the Prometheus instance.

          Args:
              query (str): A Prometheus Query Language (PromQL) expression used to fetch metric values.

          Returns:
              dict: The raw Prometheus response containing metric results, including timestamps, values, and labels.
  - name: exec_kubectl_cmd_safely
    description: |
      This is a tool used to safely execute kubectl commands. Whatever commands you executed will be stored in a rollback
      mechanism which later is used to roll back the cluster state in case your current attempt fails.

          Args:
              command (str): The kubectl command you would like to execute, must start with "kubectl"
              INTERACTIVE COMMANDS ARE NOT SUPPORTED, e.g. "kubectl edit"
              INTERACTIVE FLAGS ARE NOT SUPPORTED, e.g., "kubectl logs -f"
  - name: submit_tool
    description: |
      The tool to submit benchmark results

          Args:
              ans (str): the answer you would like to submit to the benchmark
  # Cassandra rebuild tools for code-level bug fixing
  - name: rebuild_cassandra
    description: |
      Rebuild Cassandra from modified source code. After editing files under /opt/source,
          call this tool to recompile and redeploy. Takes ~12-15 minutes total:
          - Compile with 'ant jar' (~5 minutes)
          - Build Docker image
          - Rolling restart cluster (~7 minutes)

          Args: None

          Returns: {"status": "deployed", "image": "<tag>"} on success
  - name: rebuild_status
    description: |
      Check if Cassandra rebuild is available for this problem.

          Args: None

          Returns: {"ready": bool, "allows_rebuild": bool, "has_source": bool, "has_cassandra": bool}
prompts_path: mitigation_agent_prompts.yaml
